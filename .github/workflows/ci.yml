name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: taskforge
          POSTGRES_USER: taskforge
          POSTGRES_PASSWORD: taskforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U taskforge -d taskforge"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_pgsql, redis
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: taskforge
          DB_USERNAME: taskforge
          DB_PASSWORD: taskforge
          QUEUE_CONNECTION: sync
          CACHE_STORE: array
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: taskforge
          DB_USERNAME: taskforge
          DB_PASSWORD: taskforge
          QUEUE_CONNECTION: sync
          CACHE_STORE: array
        run: php artisan test
